services:
  frontend:
    build:
      context: ./frontend
    container_name: sportstracker-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - sportstracker-network

  backend:
    build:
      context: ./backend
    container_name: sportstracker-backend
    ports:
      - "5000:5000"
    volumes:
      - ./backend:/app
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
    networks:
      - sportstracker-network

  postgres:
    image: postgres:16-alpine
    container_name: sportstracker-postgres
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5434:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - sportstracker-network

volumes:
  postgres-data:

networks:
  sportstracker-network:
    driver: bridge